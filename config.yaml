# config.yaml (starter — subset of SPEC §9; grows with later milestones)
site:
  timezone: Europe/Amsterdam
dev:
  mode: mock          # mock | replay | live  (mock/replay need no HA/battery and force dry_run)
control:
  dry_run: true
  cycle_seconds: 5     # dev: collect a sample every 5s so the dashboard updates live (prod default 300)
history:
  db_path: ems/data/ems.sqlite
web:
  port: 8080

# Telemetry sources. Default 'mock' runs credential-free. Set mode: live (or env EMS_SOURCES=live)
# to read the real devices below — READ-ONLY sensing; the battery is never commanded.
sources:
  mode: mock           # mock | live
prices:
  provider: mock       # mock | tibber  (tibber needs the TIBBER_TOKEN env var)
devices:               # local LAN addresses (read-only)
  p1_ip: 192.168.50.92
  solar_ip: 192.168.50.37
  car_ip: 192.168.50.98
  indevolt_ip: 192.168.50.53          # master tower (control writes target this one)
  indevolt_ips_extra: 192.168.50.22   # additional towers (comma-separated); read + averaged
  indevolt_port: 8080
