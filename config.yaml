# config.yaml (starter — subset of SPEC §9; grows with later milestones)
site:
  timezone: Europe/Amsterdam
dev:
  mode: mock          # mock | replay | live  (mock/replay need no HA/battery and force dry_run)
control:
  dry_run: true
  # Production sampling cadence: one history row every 5 min — low write + device-read load for a
  # 24/7 install. The live dashboard tiles refresh independently (30 s coalesced read), so this does
  # NOT make the UI stale. For fast local dev, set EMS_CYCLE_SECONDS=5 (no need to edit this file).
  cycle_seconds: 300
  # The operational control loop re-checks this often (decoupled from the recorder above) so safety
  # reactions — e.g. setting the battery to standby when the car starts charging — engage promptly.
  control_cycle_seconds: 60
history:
  db_path: ems/data/ems.sqlite
  retention_days: 90   # history older than this is purged daily (0 = keep forever)
  backup_keep: 7       # daily VACUUM-INTO snapshots kept in <db_dir>/backups (0 = off, max 60)
web:
  port: 8080

# Telemetry sources. Ships 'mock' so the app runs credential-free out of the box. Everything below
# is just a first-boot SEED — set your devices, prices, location, tokens and keys in the web UI
# (Settings / Setup); the UI values are stored in /data and override this file. Leave blank here.
sources:
  mode: mock           # mock | live   (switch to live in the UI once meters are configured)
prices:
  provider: mock       # mock | tibber (configure the Tibber token in the UI)
devices:               # local LAN addresses — leave blank; enter them in the UI (Settings → Meters)
  p1_ip: ""
  solar_ip: ""
  car_ip: ""
  indevolt_ip: ""
  indevolt_ips_extra: ""
  indevolt_port: 8080
